description: |-
  Module for managing Oracle Cloud Infrastructure Virtual Cloud Network (VCN).

  A Virtual Cloud Network (VCN) is the fundamental building block for networking in OCI. It provides:
  - Logical network boundary within a region
  - Support for multiple CIDR blocks (non-overlapping)
  - Public and private subnets
  - Integration with Internet Gateway, NAT Gateway, and Dynamic Routing Gateway (DRG)
  - DNS label for internal resolution
  - IPv6 support (optional)

  VCNs are regional resources and serve as the foundation for all network architecture in OCI.

