# Short description of this module
description: |-
  Terraform module for creating and managing Oracle Cloud Infrastructure (OCI) Compartments.

  Compartments are fundamental building blocks in OCI that provide logical isolation and organization
  of cloud resources. They enable:

  - **Resource Organization**: Group related resources together for better management
  - **IAM Boundaries**: Define access control policies at compartment level
  - **Cost Tracking**: Monitor and allocate costs by compartment
  - **Hierarchical Structure**: Create up to 6 levels of nested compartments

  This module follows OCI best practices and includes support for compartment lifecycle management,
  tagging, and integration with other OCI services.

